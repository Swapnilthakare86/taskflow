name: Deploy Frontend To S3

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Prepare Production Env
        run: |
          API_URL="${{ secrets.VITE_API_BASE_URL }}"
          if [ -z "$API_URL" ]; then
            if [ -z "${{ secrets.EC2_HOST }}" ]; then
              echo "Missing VITE_API_BASE_URL or EC2_HOST secret"
              exit 1
            fi
            API_URL="http://${{ secrets.EC2_HOST }}/api/v1"
          fi
          echo "VITE_API_BASE_URL=$API_URL" > .env.production
          echo "Using API URL: $API_URL"

      - name: Build
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload To S3
        run: aws s3 sync dist s3://${{ secrets.S3_BUCKET }} --delete

      - name: Configure S3 SPA Fallback
        run: aws s3 website s3://${{ secrets.S3_BUCKET }} --index-document index.html --error-document index.html

      - name: Invalidate CloudFront
        if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
